<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ECEAE3">
<title>Lenny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{ --paper:#ECEAE3; --ink:#26231F; --muted:#8E897F; --hair:#D4D1C9; }
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:"Space Mono",ui-monospace,Menlo,monospace;background:var(--paper);
  display:flex;align-items:center;justify-content:center;min-height:100svh;padding:24px;
  -webkit-font-smoothing:antialiased}
main{display:flex;flex-direction:column;align-items:center;gap:34px}
#stage{position:relative;display:flex;align-items:center;justify-content:center}
#lenny{width:min(68vw,300px);height:auto;display:block;
  image-rendering:pixelated;image-rendering:crisp-edges;transition:filter .6s}
.breathe{animation:breathe 5s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
body.asleep #lenny{filter:brightness(.9) saturate(.82)}
.spark{position:absolute;font-size:20px;color:var(--muted);pointer-events:none;
  animation:rise 1.4s ease-out forwards}
@keyframes rise{from{transform:translateY(0);opacity:0}20%{opacity:.8}to{transform:translateY(-54px);opacity:0}}
button{font-family:inherit;cursor:pointer;background:transparent;border:1px solid var(--hair);
  color:var(--ink);border-radius:16px;padding:14px 24px;display:flex;align-items:center;gap:11px;
  font-size:12px;letter-spacing:.14em;text-transform:uppercase;transition:border-color .2s,transform .1s}
button:active{transform:scale(.95)}
button svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.6;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
@media(hover:hover){button:hover{border-color:var(--muted)}}
@media (prefers-reduced-motion: reduce){.breathe{animation:none}}
</style>
</head>
<body>
<main>
  <div id="stage">
    <canvas id="lenny" class="breathe" width="384" height="480"
      role="img" aria-label="Lenny, doudou en pixel art"></canvas>
  </div>
  <button id="dodo" aria-label="Endormir ou réveiller Lenny">
    <svg id="ico" viewBox="0 0 24 24"><path d="M20 14.5A7.5 7.5 0 1 1 9.5 4a6 6 0 0 0 10.5 10.5Z"/></svg>
    <span id="lbl">Dodo</span>
  </button>
</main>

<script>
const PAL={'.':null,b:'#7C5C3C',w:'#F2ECDF',t:'#D8B189',k:'#2A2622',
  g:'#A9C16B',p:'#C9AED6',y:'#E9CE63',r:'#C8352E',s:'#E2912B',d:'#A6B9C0'};
const SPRITE=[
".................bbb.........bbb................",
"................bbwbb.......bbwbb...............",
"................bwwwb.......bwwwb...............",
"...............bbwwwbb.....bbwwwbb..............",
"...............bwwwwwb.....bwwwwwb..............",
"...............bwwwwwb.....bwwwwwb..............",
"...............bwwwwwb.....bwwwwwb..............",
"...............bwwwwwb.....bwwwwwb..............",
"...............bwwwwwb.....bwwwwwb..............",
"..............bbwwwwwbb...bbwwwwwbb.............",
"..............bwwwwwwwb...bwwwwwwwb.............",
"..............bwwwwwwwb...bwwwwwwwb.............",
"..............bwwwwwwwbbbbbwwwwwwwb.............",
"..............bwwwwwwwbwwwbwwwwwwwb.............",
"..............bwwwwwwwwwwwwwwwwwwwb.............",
"..............bbwwwwwwwwwwwwwwwwwbb.............",
"...............bwwwwwwwwwwwwwwwwwb..............",
"...............bwwwwwkkwwwkkwwwwwb..............",
"...............bwwwwwkkwwwkkwwwwwb..............",
"...............bwwwwwwwtttwwwwwwwb..............",
"...............bwwwwwttkktttwwwwwb..............",
"...............bwwwwtttkkttttwwwwb..............",
"...............bbwwwtttttttttwwwbb..............",
"................bwwttktttttkttwwb...............",
"................bbwwttkkkkkttwwbb...............",
".................bbwtttttttttwbb................",
".................brrtttttttttrrb................",
"................bbrrrtttttttrrrbb...............",
"........bbbbb..bbrrrrrrrtrrrrrrrbb..bbbbb.......",
"....bbbbbgggbbbbrrrrrrrrrrrrrrrrrbbbbpppbbbbb...",
".bbbbggggggggggggrrrrrrrbrrrrrrrppppppppppppbbbb",
"bbwgggggggggggggggrrrrrrbrrrrrrpppppppppppppppwb",
"wwwwwggggggggggggggggygrbrpyppppppppppppppppwwww",
"wwwwwwgggggggggggggggrrgbprrpppppppppppppppwwwww",
"wwwwwggggggggggggggggrrgbprrppppppppppppppppwwww",
"bbwgggggggggggggggggggggbpppppppppppppppppppppwb",
".bbbbgggggggggggbbbbbbbbbbbbbbbbbpppppppppppbbbb",
"....bbbbbgggbbbbyyyyyyyybrrrrrrrrbbbbpppbbbbb...",
"........bbbbb..byyyyyyyybrrrrrrrrb..bbbbb.......",
"...............byyyyyyyybrrrrrrrrb..............",
"...............byyyyyyyybrrrrrrrrb..............",
"...............byyyyyyyybrrrrrrrrb..............",
"...............byyyyyyybbrrrsrrrrb..............",
"...............byyyyyyybbrrdssrrrb..............",
"...............byyyyyyybbrssyssrrb..............",
"...............byyyyyyybbrrssdrrrb..............",
"...............byyyyyyybbrrrsrrrrb..............",
"...............byyyyyyybbrrrrrrrrb..............",
"...............byyyyyyybbrrrrrrrrb..............",
"...............byyyyyyybbrrrrrrrrb..............",
"...............byyyyyyybbrrrrrrrrb..............",
"...............byyyyyyybbrrrrrrrrb..............",
"...............byywyyyybbrrrrrwrrb..............",
"..............bbwwwwwyyybrrrwwwwwbb.............",
"..............bwwwwwwwyybrrwwwwwwwb.............",
"..............bbwwwwwbbbbbbbwwwwwbb.............",
"...............bbbwbbb.....bbbwbbb..............",
".................bbb.........bbb................",
"................................................",
"................................................"];
const FACE={
  sleep:[[21,17,'w'],[22,17,'w'],[21,18,'w'],[22,18,'w'],[26,17,'w'],[27,17,'w'],[26,18,'w'],[27,18,'w'],[21,18,'k'],[22,18,'k'],[26,18,'k'],[27,18,'k']]
};
FACE.blink=FACE.sleep;
const COLS=48,ROWS=60,PX=8;
const cv=document.getElementById('lenny'), ctx=cv.getContext('2d');
function px(x,y,key){ const c=PAL[key]; if(!c)return; ctx.fillStyle=c; ctx.fillRect(x*PX,y*PX,PX,PX); }
function draw(expr){ ctx.clearRect(0,0,cv.width,cv.height);
  for(let y=0;y<ROWS;y++){const row=SPRITE[y];for(let x=0;x<COLS;x++)px(x,y,row[x]);}
  if(expr&&FACE[expr])for(const[x,y,k]of FACE[expr])px(x,y,k); }

// état sommeil (mémorisé)
let asleep=false;
try{ asleep=JSON.parse(localStorage.getItem("lenny_asleep"))||false; }catch(e){}
const body=document.body, lbl=document.getElementById('lbl'), ico=document.getElementById('ico');
const MOON='<path d="M20 14.5A7.5 7.5 0 1 1 9.5 4a6 6 0 0 0 10.5 10.5Z"/>';
const SUN='<circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/>';
function render(){ draw(asleep?'sleep':null); body.classList.toggle('asleep',asleep);
  lbl.textContent=asleep?'Réveil':'Dodo'; ico.innerHTML=asleep?SUN:MOON; }
document.getElementById('dodo').onclick=()=>{ asleep=!asleep;
  try{ localStorage.setItem("lenny_asleep",JSON.stringify(asleep)); }catch(e){}
  render(); };

// clignement (éveillé) et Zzz (endormi)
function spark(t){ const s=document.getElementById('stage'), el=document.createElement('span');
  el.className='spark'; el.textContent=t;
  el.style.left=(s.clientWidth*0.62)+'px'; el.style.top=(s.clientHeight*0.18)+'px';
  s.appendChild(el); setTimeout(()=>el.remove(),1400); }
setInterval(()=>{ if(!asleep&&Math.random()<.5){ draw('blink'); setTimeout(()=>draw(null),160); } },4200);
setInterval(()=>{ if(asleep&&Math.random()<.6) spark('z'); },2600);

render();
</script>
</body>
</html>
